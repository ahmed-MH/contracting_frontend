# ============================================================
# Pricify — Frontend Nginx Configuration
# Optimisé pour React SPA (React Router) + Vite build
# ============================================================

server {
    listen 80;
    server_name _;

    # Racine des fichiers statiques compilés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────────────────
    # RÈGLE CLEF : React Router (client-side routing)
    # Toute URL inconnue → index.html (le routeur React prend
    # le relais côté client). Sans cette ligne, un F5 sur une
    # route comme /contracts renvoie un 404 Nginx.
    # ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────────────────
    # Cache agressif pour les assets Vite
    # Vite génère des noms de fichiers hashés (chunk.[hash].js)
    # → on peut les mettre en cache "pour toujours" en sécurité.
    # ──────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ──────────────────────────────────────────────────────────
    # En-têtes de sécurité HTTP
    # ──────────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────────────────
    # Compression Gzip
    # Réduit significativement le poids des JS/CSS Vite (~70-80%)
    # ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml;

    # ──────────────────────────────────────────────────────────
    # Pages d'erreur personnalisées
    # ──────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
